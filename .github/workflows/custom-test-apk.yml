name: Build Legado-X Test APK

on:
  workflow_dispatch:
  push:
    branches:
      - codex/legadohub-reader

permissions:
  contents: read

concurrency:
  group: legado-x-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Configure stable test signing
        shell: bash
        run: |
          cp .github/workflows/legado.jks app/legado.jks
          cat >> gradle.properties <<'EOF'
          RELEASE_STORE_FILE=./legado.jks
          RELEASE_KEY_ALIAS=legado
          RELEASE_STORE_PASSWORD=gedoor_legado
          RELEASE_KEY_PASSWORD=gedoor_legado
          EOF

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Test and build Debug APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:testAppDebugUnitTest :app:assembleAppDebug --no-daemon --stacktrace

      - name: Upload test APK
        uses: actions/upload-artifact@v7
        with:
          name: legado-X-test-apk
          path: app/build/outputs/apk/app/debug/*.apk
          if-no-files-found: error
          retention-days: 14
